name: Backend Deploy

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-deploy.yml"

  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  # Github Actions SP
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}

  # ACR
  ACR_NAME: ${{ secrets.ACR_NAME }}
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  IMAGE_NAME: cost-analyzer-backend

  # Container App
  RESOURCE_GROUP: ${{ secrets.RESOURCE_GROUP }}
  CONTAINER_APP_NAME: ${{ secrets.CONTAINER_APP_NAME }}
  CONTAINER_APP_ENV_NAME: ${{ secrets.CONTAINER_APP_ENV_NAME }}

jobs:
  # JOB 1 - build & push Docker image to ACR
  build:
    name: Build & push image
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate image tag
        id: meta
        run: echo "tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Log in to Azure (OIDC — no password)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build & push
        run: |
          IMAGE=${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}
          TAG=${{ steps.meta.outputs.tag }}

          docker build \
            --file backend/Dockerfile \
            --tag "$IMAGE:$TAG" \
            --tag "$IMAGE:latest" \
            backend/

          docker push "$IMAGE:$TAG"
          docker push "$IMAGE:latest"

  # JOB 2 — run Alembic migrations
  migrate:
    name: Run database migrations
    runs-on: ubuntu-latest
    needs: build

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies (no dev group — only what alembic needs)
        run: uv sync --no-dev

      - name: Run migrations

        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: uv run alembic upgrade head

  # JOB 3 — deploy new revision to Container Apps
  deploy:
    name: Deploy to Container Apps
    runs-on: ubuntu-latest
    needs: [build, migrate]

    steps:
      - name: Log in to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy new revision
        run: |
          IMAGE=${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}
          TAG=${{ needs.build.outputs.image_tag }}

          az containerapp update \
            --name "${{ env.CONTAINER_APP_NAME }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --image "$IMAGE:$TAG"

      - name: Verify deployment is healthy
        run: |
          echo "Waiting for revision to stabilise..."
          sleep 20

          STATUS=$(az containerapp show \
            --name "${{ env.CONTAINER_APP_NAME }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --query "properties.latestRevisionName" -o tsv)

          echo "Active revision: $STATUS"

          HEALTH=$(az containerapp revision show \
            --name "${{ env.CONTAINER_APP_NAME }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --revision "$STATUS" \
            --query "properties.healthState" -o tsv)

          echo "Health state: $HEALTH"

          if [ "$HEALTH" != "Healthy" ]; then
            echo "Deployment is not healthy. Check Container App logs."
            exit 1
          fi
